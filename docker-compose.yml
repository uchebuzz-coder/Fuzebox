services:
  dashboard:
    build: .
    container_name: vip-play-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./src:/app/src
    environment:
      - STREAMLIT_SERVER_RUNONCONFIGURATIONCHANGE=true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  cli:
    build: .
    container_name: vip-play-cli
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./src:/app/src
    working_dir: /app
    entrypoint: python main.py
    command: status
    profiles:
      - util
